spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.vet_saas: INFO
    com.vet_saas.security: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
