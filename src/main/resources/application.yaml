spring:
  application:
    name: vet-saas
  profiles:
    active: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    from-email: ${MAIL_FROM}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

app:
  auth0:
    issuer: ${AUTH0_ISSUER_URI}
    audience: ${AUTH0_AUDIENCE}

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:3600000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  security:
    encryption:
      secret: ${APP_ENCRYPTION_SECRET}

  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

  # Integraciones Externas
  external:
    public-url: ${APP_PUBLIC_URL:http://localhost:8080}
    backend-url: ${APP_BACKEND_URL:http://localhost:8080}
    frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
    api-peru:
      base-url: https://dniruc.apisperu.com/api/v1
      token: ${API_PERU_TOKEN}

    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME}
      api-key: ${CLOUDINARY_API_KEY}
      api-secret: ${CLOUDINARY_API_SECRET}

    mercadopago:
      access-token: ${MP_ACCESS_TOKEN}
      client-id: ${MP_CLIENT_ID}
      client-secret: ${MP_CLIENT_SECRET}
      sandbox-buyer-email: ${MP_SANDBOX_BUYER_EMAIL}
      sandbox: ${MP_SANDBOX:true}
      webhook-secret: ${MP_WEBHOOK_SECRET:}

    mail:
      username: ${MAIL_USERNAME}

    resend:
      api-key: ${RESEND_API_KEY}
      from-email: ${RESEND_FROM:onboarding@resend.dev}

  notification:
    admin-email: ${ADMIN_EMAIL:admin@huella360.com}

  business:
    commission-percentage: ${COMMISSION_PERCENTAGE:0.05}
    default-country: ${DEFAULT_COUNTRY:Peru}
    default-currency: ${DEFAULT_CURRENCY:PEN}
    default-plan-name: ${DEFAULT_PLAN_NAME:Basico}

  ia:
    openai-api-key: ${OPENAI_API_KEY:}
    openai-model: ${OPENAI_MODEL:gpt-4o-mini}

logging:
  level:
    root: INFO
    com.vet_saas: INFO
    com.vet_saas.security: DEBUG
    org.springframework.security: INFO
    org.springframework.security.oauth2: DEBUG
    org.springframework.data.repository.config.RepositoryConfigurationExtensionSupport: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs
