name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -q

      - name: Run tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/testdb
          DB_USERNAME: test
          DB_PASSWORD: test
          JWT_SECRET: test-secret-key-for-ci-that-is-at-least-32-chars
          APP_ENCRYPTION_SECRET: test-encryption-secret-32-chars!!
          AUTH0_ISSUER_URI: https://test.auth0.com/
          AUTH0_AUDIENCE: test-audience
          REDIS_HOST: localhost
        run: mvn test -q

      - name: Package
        run: mvn package -DskipTests -q

      - name: Build Docker image
        if: github.ref == 'refs/heads/main'
        run: docker build -t vet-saas:${{ github.sha }} .

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: vet-saas-jar
          path: target/*.jar
          retention-days: 7
